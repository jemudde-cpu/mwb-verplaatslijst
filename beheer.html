<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beheer – Middelwatering Bouw</title>
<meta name="theme-color" content="#0a1628">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --oranje:    #f97316;
  --groen:     #22c55e;
  --rood:      #ef4444;
  --blauw:     #4d7cfe;
  --tekst:     rgba(255,255,255,0.95);
  --zacht:     rgba(255,255,255,0.55);
  --dim:       rgba(255,255,255,0.30);
  --glas-rand: rgba(255,255,255,0.13);
  --glas-bg:   rgba(255,255,255,0.06);
  --input-bg:  rgba(255,255,255,0.07);
  --radius-lg: 18px;
  --radius:    12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',-apple-system,sans-serif;background:#060e1c;color:var(--tekst);min-height:100vh;overflow-x:hidden;}

/* ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#1a3a9f,#0d1f5a 60%,transparent);top:-150px;left:-100px;animation:d1 22s ease-in-out infinite alternate;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#2d5be3,#0a1f6e 60%,transparent);bottom:-100px;right:-60px;animation:d2 28s ease-in-out infinite alternate;}
.orb-4{width:220px;height:220px;background:radial-gradient(circle,rgba(249,115,22,.45),transparent 65%);top:15%;right:-50px;animation:d2 24s ease-in-out infinite alternate;}
@keyframes d1{from{transform:translate(0,0) scale(1)}to{transform:translate(50px,70px) scale(1.1)}}
@keyframes d2{from{transform:translate(0,0)}to{transform:translate(-40px,-50px)}}

/* WACHTWOORD OVERLAY */
.pw-overlay{position:fixed;inset:0;z-index:500;background:#060e1c;display:flex;align-items:center;justify-content:center;padding:24px;}
.pw-overlay.verborgen{display:none;}
.pw-box{width:100%;max-width:380px;text-align:center;}
.pw-logo{width:56px;height:56px;background:var(--oranje);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
.pw-titel{font-size:22px;font-weight:800;margin-bottom:8px;}
.pw-sub{font-size:14px;color:var(--zacht);margin-bottom:28px;}
.pw-input{width:100%;padding:14px 18px;border:1.5px solid rgba(255,255,255,.18);border-radius:var(--radius);font-family:inherit;font-size:16px;font-weight:600;color:var(--tekst);background:rgba(255,255,255,.08);text-align:center;letter-spacing:4px;margin-bottom:12px;-webkit-appearance:none;}
.pw-input:focus{outline:none;border-color:rgba(249,115,22,.60);box-shadow:0 0 0 3px rgba(249,115,22,.18);}
.pw-input.fout{border-color:rgba(239,68,68,.70);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pw-btn{width:100%;padding:15px;background:var(--oranje);border:none;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;-webkit-appearance:none;}
.pw-fout{color:rgba(239,68,68,.85);font-size:13px;margin-top:10px;min-height:20px;}
.pw-link{font-size:13px;color:var(--zacht);margin-top:20px;}
.pw-link a{color:var(--oranje);text-decoration:none;}

/* HEADER */
header{position:sticky;top:0;z-index:60;background:rgba(6,14,28,.88);-webkit-backdrop-filter:blur(28px) saturate(160%);backdrop-filter:blur(28px) saturate(160%);border-bottom:1px solid rgba(255,255,255,.09);}
.header-top{display:flex;align-items:center;gap:12px;padding:12px 18px;}
.header-logo{width:30px;height:30px;background:var(--oranje);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.header-title{flex:1;font-size:15px;font-weight:700;line-height:1.2;}
.header-title small{display:block;font-size:10px;font-weight:400;opacity:.50;}
.header-app-link{font-size:12px;font-weight:600;color:var(--oranje);text-decoration:none;padding:6px 14px;border:1px solid rgba(249,115,22,.30);border-radius:20px;background:rgba(249,115,22,.08);white-space:nowrap;}
.header-logout{font-size:12px;font-weight:600;color:var(--zacht);padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:20px;background:transparent;cursor:pointer;-webkit-appearance:none;}

/* TABS */
.tab-nav{display:flex;padding:0 16px 12px;gap:6px;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav-btn{flex-shrink:0;padding:9px 18px;border-radius:30px;font-family:inherit;font-size:13px;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:var(--zacht);cursor:pointer;transition:all .2s;-webkit-appearance:none;}
.tab-nav-btn.active{background:var(--oranje);border-color:var(--oranje);color:#fff;box-shadow:0 3px 14px rgba(249,115,22,.35);}

/* CONTENT */
.main{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:16px 16px 40px;}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* GLASS CARD */
.card{background:var(--glas-bg);-webkit-backdrop-filter:brightness(1.05) blur(24px) saturate(150%);backdrop-filter:brightness(1.05) blur(24px) saturate(150%);border:1px solid var(--glas-rand);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.10);}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;}
.card-title-row{display:flex;align-items:center;gap:10px;}
.card-icon{font-size:20px;flex-shrink:0;}
.card-title{font-size:14px;font-weight:700;color:var(--tekst);}
.card-sub{font-size:11px;color:var(--zacht);margin-top:2px;}
.card-body{padding:0 16px 16px;}
.divider{height:1px;background:rgba(255,255,255,.07);margin:12px 0;}

/* ZOEKBALK */
.search-wrap{position:relative;margin-bottom:14px;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--zacht);pointer-events:none;}
.search-input{width:100%;padding:12px 14px 12px 40px;border:1px solid rgba(255,255,255,.13);border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;color:var(--tekst);background:rgba(255,255,255,.07);-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--dim);}
.search-input:focus{outline:none;border-color:rgba(249,115,22,.55);box-shadow:0 0 0 3px rgba(249,115,22,.13);}

/* INZENDING KAART */
.inz-card{background:rgba(14,26,52,.75);border:1px solid rgba(255,255,255,.11);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.22);transition:border-color .2s;}
.inz-card:hover{border-color:rgba(255,255,255,.18);}
.inz-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.inz-icon{font-size:22px;flex-shrink:0;}
.inz-info{flex:1;min-width:0;}
.inz-naam{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inz-meta{font-size:11px;color:var(--zacht);margin-top:2px;}
.inz-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;flex-shrink:0;}
.status-nieuw{background:rgba(249,115,22,.18);color:var(--oranje);}
.status-verwerkt{background:rgba(34,197,94,.18);color:var(--groen);}
.inz-chevron{color:var(--dim);font-size:14px;flex-shrink:0;transition:transform .25s;}
.inz-card.open .inz-chevron{transform:rotate(90deg);}
.inz-body{display:none;padding:0 16px 16px;border-top:1px solid rgba(255,255,255,.07);}
.inz-card.open .inz-body{display:block;}
.inz-detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--zacht);margin:12px 0 6px;}
.inz-detail-tekst{font-size:13px;color:var(--tekst);line-height:1.6;white-space:pre-wrap;}
.inz-fotos{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.inz-foto{width:80px;height:80px;border-radius:10px;object-fit:cover;border:1.5px solid rgba(255,255,255,.15);cursor:pointer;transition:transform .2s;}
.inz-foto:active{transform:scale(.95);}

/* FOTO LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;}

/* KLUS KAARTEN */
.klus-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.06);transition:background .15s;}
.klus-item:last-child{border-bottom:none;}
.klus-item:hover{background:rgba(255,255,255,.03);}
.klus-naam{flex:1;font-size:14px;font-weight:600;}
.klus-nr{font-size:11px;font-weight:700;color:var(--oranje);padding:3px 9px;background:rgba(249,115,22,.12);border-radius:10px;flex-shrink:0;}
.klus-acties{display:flex;gap:6px;flex-shrink:0;}
.klus-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;-webkit-appearance:none;transition:background .15s;}
.klus-btn-del{background:rgba(239,68,68,.15);color:rgba(239,68,68,.80);}
.klus-btn-del:active{background:rgba(239,68,68,.30);}

/* ADD KLUS */
.add-klus-wrap{padding:14px 16px;}
.add-klus-row{display:flex;gap:8px;}
.add-klus-input{flex:1;padding:11px 14px;border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:500;color:var(--tekst);background:rgba(255,255,255,.07);-webkit-appearance:none;}
.add-klus-input:focus{outline:none;border-color:rgba(249,115,22,.55);box-shadow:0 0 0 2px rgba(249,115,22,.13);}
.add-klus-btn{padding:11px 18px;background:var(--oranje);border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:700;color:#fff;cursor:pointer;-webkit-appearance:none;white-space:nowrap;}

/* MATERIEEL OVERZICHT */
.mat-locatie-card{background:rgba(14,26,52,.65);border:1px solid rgba(255,255,255,.10);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.mat-locatie-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;gap:12px;}
.mat-locatie-naam{font-size:14px;font-weight:700;}
.mat-locatie-nr{font-size:11px;font-weight:700;color:var(--oranje);padding:3px 9px;background:rgba(249,115,22,.12);border-radius:10px;}
.mat-locatie-teller{font-size:11px;color:var(--zacht);margin-top:2px;}
.mat-chevron{color:var(--dim);font-size:14px;transition:transform .25s;}
.mat-locatie-card.open .mat-chevron{transform:rotate(90deg);}
.mat-body{display:none;border-top:1px solid rgba(255,255,255,.07);}
.mat-locatie-card.open .mat-body{display:block;}
.mat-item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);}
.mat-item-row:last-child{border-bottom:none;}
.mat-item-naam{font-size:13px;font-weight:600;}
.mat-item-nrs{font-size:11px;color:var(--zacht);margin-top:2px;}
.mat-item-badge{font-size:12px;font-weight:700;color:var(--oranje);background:rgba(249,115,22,.12);padding:3px 10px;border-radius:10px;}

/* OPSLAAN BTN */
.opslaan-btn{width:100%;padding:15px;background:var(--groen);border:none;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;-webkit-appearance:none;margin-top:16px;transition:opacity .2s;}
.opslaan-btn:active{opacity:.85;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:40px 20px;color:var(--zacht);font-size:14px;}
.spinner{width:24px;height:24px;border:3px solid rgba(249,115,22,.20);border-top-color:var(--oranje);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* LEEG */
.leeg{text-align:center;padding:40px 20px;color:var(--zacht);font-size:14px;}

/* BADGE TELLERS */
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(249,115,22,.25);color:var(--oranje);font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;padding:0 5px;margin-left:6px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:600;background:rgba(15,27,54,.98);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:12px 22px;font-size:14px;font-weight:600;color:var(--tekst);box-shadow:0 8px 32px rgba(0,0,0,.50);opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-4"></div>

<!-- WACHTWOORD OVERLAY -->
<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div class="pw-logo">⚙️</div>
    <div class="pw-titel">Beheer</div>
    <div class="pw-sub">Voer het beheerderswachtwoord in om toegang te krijgen.</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Inloggen →</button>
    <div class="pw-fout" id="pw-fout"></div>
    <div class="pw-link">Terug naar de <a href="index.html">app</a></div>
  </div>
</div>

<header>
  <div class="header-top">
    <div class="header-logo">⚙️</div>
    <div class="header-title">
      Beheer
      <small>Middelwatering Bouw</small>
    </div>
    <a href="index.html" class="header-app-link">← App</a>
    <button class="header-logout" onclick="uitloggen()">Uitloggen</button>
  </div>
  <nav class="tab-nav">
    <button class="tab-nav-btn active" onclick="tabSwitch('materieel',this)">📍 Materieel</button>
    <button class="tab-nav-btn" onclick="tabSwitch('inzendingen',this)">📋 Inzendingen <span class="tab-badge" id="badge-inz">0</span></button>
    <button class="tab-nav-btn" onclick="tabSwitch('klussen',this)">🏗️ Klussen <span class="tab-badge" id="badge-kl">0</span></button>
  </nav>
</header>

<!-- TAB: MATERIEEL -->
<div class="main tab-content active" id="tab-materieel">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="zoek-mat" placeholder="Zoek op klus of werknummer..." oninput="filterMaterieel()">
  </div>
  <div id="materieel-content">
    <div class="loading"><div class="spinner"></div> Laden...</div>
  </div>
</div>

<!-- TAB: INZENDINGEN -->
<div class="main tab-content" id="tab-inzendingen">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="zoek-inz" placeholder="Zoek op naam of klus..." oninput="filterInzendingen()">
  </div>
  <div id="inzendingen-content">
    <div class="loading"><div class="spinner"></div> Laden...</div>
  </div>
</div>

<!-- TAB: KLUSSEN -->
<div class="main tab-content" id="tab-klussen">
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <span class="card-icon">➕</span>
        <div>
          <div class="card-title">Klus toevoegen</div>
          <div class="card-sub">Naam en werknummer</div>
        </div>
      </div>
    </div>
    <div class="add-klus-wrap">
      <div class="add-klus-row" style="margin-bottom:8px;">
        <input class="add-klus-input" type="text" id="nieuw-klus-naam" placeholder="Klusnaam..." style="flex:2;">
        <input class="add-klus-input" type="text" id="nieuw-klus-nr" placeholder="Werknr." style="flex:1;">
      </div>
      <button class="add-klus-btn" style="width:100%;" onclick="voegKlusToe()">+ Klus toevoegen</button>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="zoek-klus" placeholder="Zoek op naam of werknummer..." oninput="filterKlussen()">
  </div>

  <div class="card" id="klussen-lijst-card">
    <div id="klussen-content">
      <div class="loading"><div class="spinner"></div> Laden...</div>
    </div>
    <div class="card-body" style="padding-top:0;">
      <button class="opslaan-btn" onclick="slaKlussenOp()">💾 Wijzigingen opslaan</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://mwb-verplaatslijst.je-mudde.workers.dev';
const WACHTWOORD = 'mwb2024';  // ← Pas dit aan om het wachtwoord te wijzigen

let alleInzendingen = [];
let alleKlussen     = [];
let locatieMap      = {};

/* ── WACHTWOORD ───────────────────────────────────── */
function checkPw() {
  const input = document.getElementById('pw-input');
  const fout  = document.getElementById('pw-fout');
  if (input.value === WACHTWOORD) {
    const exp = Date.now() + 8 * 60 * 60 * 1000;
    localStorage.setItem('mwb_beheer_exp', exp);
    document.getElementById('pw-overlay').classList.add('verborgen');
    init();
  } else {
    input.classList.add('fout');
    fout.textContent = 'Onjuist wachtwoord.';
    setTimeout(() => { input.classList.remove('fout'); input.value = ''; }, 600);
  }
}

function uitloggen() {
  localStorage.removeItem('mwb_beheer_exp');
  location.reload();
}

function checkAuth() {
  const exp = parseInt(localStorage.getItem('mwb_beheer_exp') || '0');
  if (exp > Date.now()) {
    document.getElementById('pw-overlay').classList.add('verborgen');
    return true;
  }
  return false;
}

/* ── TABS ─────────────────────────────────────────── */
function tabSwitch(naam, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + naam).classList.add('active');
  btn.classList.add('active');
}

/* ── INIT ─────────────────────────────────────────── */
function init() {
  laadInzendingen();
  laadKlussen();
}

/* ── INZENDINGEN ──────────────────────────────────── */
async function laadInzendingen() {
  document.getElementById('inzendingen-content').innerHTML = '<div class="loading"><div class="spinner"></div> Inzendingen laden...</div>';
  document.getElementById('materieel-content').innerHTML   = '<div class="loading"><div class="spinner"></div> Materieel berekenen...</div>';
  try {
    const res  = await fetch(WORKER + '?action=inzendingen');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    alleInzendingen = data.results;
    document.getElementById('badge-inz').textContent = alleInzendingen.length;
    renderInzendingen();
    locatieMap = bouwLocatieMap(alleInzendingen);
    renderMaterieel();
  } catch (e) {
    document.getElementById('inzendingen-content').innerHTML = `<div class="leeg">❌ ${e.message}</div>`;
    document.getElementById('materieel-content').innerHTML   = `<div class="leeg">❌ ${e.message}</div>`;
  }
}

function renderInzendingen(zoek) {
  const term = (zoek || document.getElementById('zoek-inz').value).toLowerCase();
  const lijst = alleInzendingen.filter(inz => {
    if (!term) return true;
    const naam    = prop(inz,'Naam')?.title?.[0]?.plain_text || '';
    const bp      = prop(inz,'Bouwplaats')?.rich_text?.[0]?.plain_text || '';
    const invuld  = prop(inz,'Ingevuld door')?.rich_text?.[0]?.plain_text || '';
    return naam.toLowerCase().includes(term) || bp.toLowerCase().includes(term) || invuld.toLowerCase().includes(term);
  });

  if (!lijst.length) {
    document.getElementById('inzendingen-content').innerHTML = '<div class="leeg">Geen inzendingen gevonden.</div>';
    return;
  }

  document.getElementById('inzendingen-content').innerHTML = lijst.map(inz => renderInzCard(inz)).join('');
}

function renderInzCard(inz) {
  const naam    = prop(inz,'Naam')?.title?.[0]?.plain_text || '—';
  const bp      = prop(inz,'Bouwplaats')?.rich_text?.[0]?.plain_text || '';
  const vanNr   = prop(inz,'Werknr. Van')?.rich_text?.[0]?.plain_text || '';
  const naarNr  = prop(inz,'Werknr. Naar')?.rich_text?.[0]?.plain_text || '';
  const invuld  = prop(inz,'Ingevuld door')?.rich_text?.[0]?.plain_text || '—';
  const datum   = prop(inz,'Datum')?.date?.start || '';
  const details = prop(inz,'Details')?.rich_text?.[0]?.plain_text || '';
  const opm     = prop(inz,'Opmerkingen')?.rich_text?.[0]?.plain_text || '';
  const status  = prop(inz,'Status')?.select?.name || 'Nieuw';
  const type    = prop(inz,'Opslag / Zaak')?.rich_text?.[0]?.plain_text || '';
  const id      = inz.id.replace(/-/g,'');

  const statusClass = status === 'Verwerkt' ? 'status-verwerkt' : 'status-nieuw';
  const icon = type.includes('Zaak') && type.includes('Klus') ? '📦'
             : type.includes('Klus') && type.includes('Klus') ? '🔄'
             : '🏭';

  // Foto URLs uit details halen
  const fotoUrls = [];
  const fotoRegex = /(https:\/\/[^\s]+)/g;
  let m;
  while ((m = fotoRegex.exec(details)) !== null) fotoUrls.push(m[1]);

  const fotoHtml = fotoUrls.length
    ? `<div class="inz-fotos">${fotoUrls.map(url =>
        `<img class="inz-foto" src="${url}" alt="foto" onclick="openLightbox('${url}')" loading="lazy">`
      ).join('')}</div>`
    : '';

  const detailsTekst = details.replace(/\n?Foto's.*$/s, '').trim();

  return `<div class="inz-card" id="inz-${id}">
    <div class="inz-header" onclick="toggleInz('${id}')">
      <span class="inz-icon">${icon}</span>
      <div class="inz-info">
        <div class="inz-naam">${naam}</div>
        <div class="inz-meta">${datum} · ${invuld}</div>
      </div>
      <span class="inz-status ${statusClass}">${status}</span>
      <span class="inz-chevron">›</span>
    </div>
    <div class="inz-body">
      <div class="inz-detail-label">Route</div>
      <div class="inz-detail-tekst">${type || '—'}\n${vanNr || '—'} → ${bp || naarNr || '—'}</div>
      ${detailsTekst ? `<div class="inz-detail-label">Materieel</div><div class="inz-detail-tekst">${detailsTekst}</div>` : ''}
      ${opm ? `<div class="inz-detail-label">Opmerking</div><div class="inz-detail-tekst">${opm}</div>` : ''}
      ${fotoHtml}
    </div>
  </div>`;
}

function toggleInz(id) {
  document.getElementById('inz-' + id)?.classList.toggle('open');
}

function filterInzendingen() {
  renderInzendingen();
}

/* ── KLUSSEN ──────────────────────────────────────── */
async function laadKlussen() {
  try {
    const res  = await fetch(WORKER + '?action=klussen');
    const data = await res.json();
    alleKlussen = data.ok && data.klussen.length ? data.klussen : KLUSSEN_DEFAULT;
    document.getElementById('badge-kl').textContent = alleKlussen.length;
    renderKlussen();
  } catch (e) {
    alleKlussen = [...KLUSSEN_DEFAULT];
    renderKlussen();
  }
}

function renderKlussen(zoek) {
  const term  = (zoek || document.getElementById('zoek-klus').value).toLowerCase();
  const lijst = alleKlussen.filter(k =>
    !term || k.naam.toLowerCase().includes(term) || k.werknr.toLowerCase().includes(term)
  );

  if (!lijst.length) {
    document.getElementById('klussen-content').innerHTML = '<div class="leeg">Geen klussen gevonden.</div>';
    return;
  }

  document.getElementById('klussen-content').innerHTML = lijst.map((k, i) => {
    const realIdx = alleKlussen.indexOf(k);
    return `<div class="klus-item">
      <div class="klus-naam">${k.naam}</div>
      <span class="klus-nr">${k.werknr}</span>
      <div class="klus-acties">
        <button class="klus-btn klus-btn-del" title="Verwijderen" onclick="verwijderKlus(${realIdx})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function filterKlussen() {
  renderKlussen();
}

function voegKlusToe() {
  const naam = document.getElementById('nieuw-klus-naam').value.trim();
  const nr   = document.getElementById('nieuw-klus-nr').value.trim();
  if (!naam || !nr) { showToast('⚠️ Vul naam en werknummer in'); return; }
  alleKlussen.unshift({ naam, werknr: nr });
  document.getElementById('nieuw-klus-naam').value = '';
  document.getElementById('nieuw-klus-nr').value   = '';
  document.getElementById('badge-kl').textContent  = alleKlussen.length;
  renderKlussen();
  showToast('✓ Klus toegevoegd');
}

function verwijderKlus(idx) {
  if (!confirm(`Verwijder "${alleKlussen[idx].naam}"?`)) return;
  alleKlussen.splice(idx, 1);
  document.getElementById('badge-kl').textContent = alleKlussen.length;
  renderKlussen();
}

async function slaKlussenOp() {
  try {
    const res  = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'klussen_opslaan', klussen: alleKlussen }),
    });
    const data = await res.json();
    if (data.ok) showToast('✓ Klussen opgeslagen');
    else showToast('❌ Fout: ' + data.error);
  } catch (e) {
    showToast('❌ Verbindingsfout');
  }
}

/* ── MATERIEEL OVERZICHT ──────────────────────────── */
const SECTIES = {
  'Aansluitingen': [
    { id:'bouwmeterkast', naam:'Bouwmeterkast' },
    { id:'waterput',      naam:'Waterput' },
    { id:'waterkraan',    naam:'Waterkraan / standvink' },
  ],
  'Keten': [
    { id:'schaftkeet',      naam:'Schaftkeet' },
    { id:'uitvoerderskeet', naam:'Uitvoerderskeet' },
    { id:'pipokeet',        naam:'Pipokeet' },
    { id:'keettrap',        naam:'Keettrap (set)' },
  ],
  'Containers': [{ id:'container', naam:'Materiaalcontainer' }],
  'Lichtmasten': [{ id:'lichtmast', naam:'Lichtmast' }],
  'Bouwhekken': [
    { id:'bouwhekken',          naam:'Bouwhekken' },
    { id:'bouwhek_voeten',      naam:'Bouwhek voeten' },
    { id:'hekklemmen',          naam:'Hekklemmen' },
    { id:'hekwielen',           naam:'Hekwielen' },
    { id:'hek_schoren',         naam:'Hek schoren' },
    { id:'kunststof_rijplaten', naam:'Kunststof rijplaten' },
  ],

function bouwLocatieMap(inzendingen) {
  const gesorteerd = [...inzendingen].sort((a, b) => {
    const da = prop(a,'Datum')?.date?.start || '';
    const db = prop(b,'Datum')?.date?.start || '';
    return da.localeCompare(db);
  });

  const locaties = {};
  function ensureLocatie(naam, werknr) {
    const key = werknr || naam;
    if (!locaties[key]) locaties[key] = { naam, werknr, items: {} };
    return key;
  }
  function addItem(locKey, itemId, itemNaam, aantal, nummers) {
    if (!locaties[locKey]) return;
    if (!locaties[locKey].items[itemId]) locaties[locKey].items[itemId] = { naam: itemNaam, aantal: 0, nummers: [] };
    locaties[locKey].items[itemId].aantal += aantal;
    if (nummers) nummers.forEach(n => { if (!locaties[locKey].items[itemId].nummers.includes(n)) locaties[locKey].items[itemId].nummers.push(n); });
  }
  function removeItem(locKey, itemId, aantal, nummers) {
    if (!locaties[locKey]?.items[itemId]) return;
    locaties[locKey].items[itemId].aantal = Math.max(0, locaties[locKey].items[itemId].aantal - aantal);
    if (nummers) nummers.forEach(n => { const i = locaties[locKey].items[itemId].nummers.indexOf(n); if (i >= 0) locaties[locKey].items[itemId].nummers.splice(i,1); });
  }

  for (const inz of gesorteerd) {
    const details = prop(inz,'Details')?.rich_text?.[0]?.plain_text || '';
    const vanNr   = prop(inz,'Werknr. Van')?.rich_text?.[0]?.plain_text || '';
    const naarNr  = prop(inz,'Werknr. Naar')?.rich_text?.[0]?.plain_text || '';
    const naarNm  = prop(inz,'Bouwplaats')?.rich_text?.[0]?.plain_text || naarNr;
    if (!vanNr && !naarNr) continue;
    const vanKey  = vanNr  ? ensureLocatie(vanNr, vanNr)   : null;
    const naarKey = naarNr ? ensureLocatie(naarNm, naarNr) : null;
    const items = parseDetails(details);
    for (const ri of items) {
      if (vanKey)  removeItem(vanKey, ri.id, ri.aantal, ri.nummers);
      if (naarKey) addItem(naarKey, ri.id, ri.naam, ri.aantal, ri.nummers);
    }
  }
  for (const key of Object.keys(locaties)) {
    if (Object.keys(locaties[key].items).length === 0) delete locaties[key];
  }
  return locaties;
}

function parseDetails(tekst) {
  if (!tekst) return [];
  const items = [];
  const alle  = Object.values(SECTIES).flat();
  for (const line of tekst.split('\n')) {
    for (const item of alle) {
      if (line.startsWith(item.naam + ':')) {
        const aantalMatch = line.match(/:\s*(\d+)/);
        const nummerMatch = line.match(/nr\.\s*([^)]+)/);
        const aantal      = aantalMatch ? parseInt(aantalMatch[1]) : 0;
        const nummers     = nummerMatch ? nummerMatch[1].split(',').map(n => n.trim()).filter(Boolean) : [];
        if (aantal > 0) items.push({ id: item.id, naam: item.naam, aantal, nummers });
        break;
      }
    }
  }
  return items;
}

function renderMaterieel(zoek) {
  const term   = (zoek || document.getElementById('zoek-mat').value).toLowerCase();
  const locKeys = Object.keys(locatieMap).filter(k => {
    const loc = locatieMap[k];
    return !term || loc.naam.toLowerCase().includes(term) || loc.werknr.toLowerCase().includes(term);
  });

  if (locKeys.length === 0) {
    document.getElementById('materieel-content').innerHTML = '<div class="leeg">Geen materieel gevonden.</div>';
    return;
  }

  const zaakKeys = locKeys.filter(k => k === 'DE ZAAK' || locatieMap[k].naam.includes('Zaak'));
  const klusKeys = locKeys.filter(k => !zaakKeys.includes(k));
  const gesorteerd = [...zaakKeys, ...klusKeys];

  document.getElementById('materieel-content').innerHTML = gesorteerd.map(k => {
    const loc   = locatieMap[k];
    const items = Object.entries(loc.items);
    const totaal = items.reduce((s, [,v]) => s + v.aantal, 0);
    const safeId = k.replace(/[^a-z0-9]/gi,'_');
    const isZaak = zaakKeys.includes(k);

    const itemRegels = items.map(([id, v]) => {
      const nrTekst = v.nummers?.length ? `<div class="mat-item-nrs">Nr: ${v.nummers.join(', ')}</div>` : '';
      return `<div class="mat-item-row">
        <div><div class="mat-item-naam">${v.naam}</div>${nrTekst}</div>
        <div class="mat-item-badge">${v.aantal}×</div>
      </div>`;
    }).join('');

    return `<div class="mat-locatie-card ${isZaak ? 'zaak' : ''}" id="ml-${safeId}">
      <div class="mat-locatie-header" onclick="this.closest('.mat-locatie-card').classList.toggle('open')">
        <div>
          <div class="mat-locatie-naam">${isZaak ? '🏭 ' : '🏗️ '}${loc.naam || loc.werknr}</div>
          <div class="mat-locatie-teller">${items.length} soorten · ${totaal} stuks</div>
        </div>
        ${loc.werknr && loc.werknr !== 'DE ZAAK' ? `<span class="mat-locatie-nr">${loc.werknr}</span>` : ''}
        <span class="mat-chevron">›</span>
      </div>
      <div class="mat-body">${itemRegels}</div>
    </div>`;
  }).join('');
}

function filterMaterieel() {
  renderMaterieel();
}
