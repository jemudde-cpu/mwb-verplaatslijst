<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Verplaatslijst – Middelwatering Bouw</title>
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --accent:    #4d7cfe;
  --oranje:    #f97316;
  --oranje-zacht: rgba(249,115,22,0.18);
  --tekst:     rgba(255,255,255,0.95);
  --zacht:     rgba(255,255,255,0.50);
  --placeholder: rgba(255,255,255,0.28);
  --glas-rand: rgba(255,255,255,0.18);
  --radius:    22px;
  --radius-sm: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #050d1a;
  color: var(--tekst);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── ACHTERGROND ORBS ───────────────────────── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #1a3a9f 0%, #0d1f5a 60%, transparent 100%);
  top: -200px; left: -150px;
  animation: drift1 22s ease-in-out infinite alternate;
}
.orb-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #2d5be3 0%, #0a1f6e 60%, transparent 100%);
  bottom: -150px; right: -100px;
  animation: drift2 28s ease-in-out infinite alternate;
}
.orb-3 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, #1a4acc 0%, #071540 60%, transparent 100%);
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  animation: drift3 18s ease-in-out infinite alternate;
}
.orb-4 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(249,115,22,0.55) 0%, rgba(234,88,12,0.20) 50%, transparent 100%);
  top: 20%; right: -80px;
  animation: drift2 24s ease-in-out infinite alternate;
}
.orb-5 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(249,115,22,0.40) 0%, rgba(234,88,12,0.12) 50%, transparent 100%);
  bottom: 25%; left: -60px;
  animation: drift1 30s ease-in-out infinite alternate;
}
@keyframes drift1 {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(60px, 80px) scale(1.1); }
}
@keyframes drift2 {
  from { transform: translate(0,0) scale(1.05); }
  to   { transform: translate(-50px,-60px) scale(0.95); }
}
@keyframes drift3 {
  from { transform: translate(-50%,-50%) scale(1); }
  to   { transform: translate(-50%,-50%) scale(1.15); }
}

/* ─── LAYOUT ─────────────────────────────────── */
.container { position: relative; z-index: 1; padding: 16px; max-width: 680px; margin: 0 auto; padding-bottom: 110px; }
header, .btn-bar, .toast { position: relative; z-index: 2; }

/* ─── LIQUID GLASS MIXIN ─────────────────────── */
.glass {
  background: rgba(255,255,255,0.07);
  -webkit-backdrop-filter: brightness(1.08) blur(28px) saturate(160%) url(#liquid);
  backdrop-filter: brightness(1.08) blur(28px) saturate(160%) url(#liquid);
  border: 1px solid var(--glas-rand);
  position: relative;
}
.glass::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  box-shadow:
    inset 6px 6px 0px -6px rgba(255,255,255,0.65),
    inset 0 0 10px 1px rgba(255,255,255,0.12);
  pointer-events: none; z-index: 1;
}

/* ─── HEADER ─────────────────────────────────── */
header {
  background: rgba(5,13,26,0.70);
  -webkit-backdrop-filter: brightness(1.05) blur(30px) saturate(160%);
  backdrop-filter: brightness(1.05) blur(30px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,0.10);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 4px 30px rgba(0,0,0,0.40);
}
header img { height: 34px; object-fit: contain; }
header h1  { color: #fff; font-size: 16px; font-weight: 700; line-height: 1.2; letter-spacing: -.2px; }
header h1 small { display: block; font-size: 11px; font-weight: 400; opacity: .50; letter-spacing: .1px; }

/* ─── CARD ───────────────────────────────────── */
.card {
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  filter: drop-shadow(-4px -6px 30px rgba(0,0,0,0.30));
}
.card-header {
  background: rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  border-left: 3px solid var(--oranje);
  color: rgba(255,255,255,0.90);
  padding: 14px 18px;
  font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
  transition: background .2s;
}
.card-header:hover { background: rgba(255,255,255,0.10); }
.card-header .chevron { transition: transform .3s cubic-bezier(.34,1.56,.64,1); font-size: 12px; opacity: .55; }
.card-header.open .chevron { transform: rotate(180deg); }
.card-body { padding: 16px 18px; }
.card-body.collapsed { display: none; }

/* ─── VELD ───────────────────────────────────── */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 10px; font-weight: 700;
  color: var(--zacht);
  text-transform: uppercase; letter-spacing: .6px;
  margin-bottom: 6px;
}
.field input,
.field textarea,
.field select {
  width: 100%; padding: 12px 14px;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; font-weight: 500;
  color: var(--tekst);
  background: rgba(255,255,255,0.06);
  transition: border-color .2s, background .2s, box-shadow .25s;
  -webkit-appearance: none;
}
.field input::placeholder, .field textarea::placeholder { color: var(--placeholder); }
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: rgba(77,124,254,0.65);
  background: rgba(255,255,255,0.10);
  box-shadow: 0 0 0 3px rgba(77,124,254,0.18);
}
.field input[type="date"] { color-scheme: dark; }
.field textarea { resize: vertical; }

/* ─── GRID ───────────────────────────────────── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ─── SECTIE SCHEIDER ────────────────────────── */
.sectie-label {
  font-size: 10px; font-weight: 700; color: var(--zacht);
  text-transform: uppercase; letter-spacing: .6px;
  padding: 10px 0 7px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 10px;
}

/* ─── ONDERDEEL ROW ──────────────────────────── */
.onderdeel {
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius-sm);
  margin-bottom: 8px; overflow: hidden;
  background: rgba(255,255,255,0.03);
  transition: border-color .2s, background .2s;
}
.onderdeel:hover { border-color: rgba(255,255,255,0.16); background: rgba(255,255,255,0.05); }
.onderdeel-title {
  padding: 12px 14px;
  font-weight: 600; font-size: 14px;
  color: rgba(255,255,255,0.88);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.onderdeel-title .badge {
  font-size: 11px; font-weight: 700;
  background: var(--oranje); color: #fff;
  border-radius: 20px; padding: 2px 9px;
  min-width: 28px; text-align: center;
  box-shadow: 0 2px 10px rgba(249,115,22,0.45);
}
.onderdeel-title .badge.leeg {
  background: rgba(255,255,255,0.09); color: var(--zacht);
  font-weight: 500; box-shadow: none;
}
.onderdeel-detail {
  padding: 12px 14px; display: none;
  border-top: 1px solid rgba(255,255,255,0.07);
  background: rgba(0,0,0,0.15);
}
.onderdeel-detail.open { display: block; }
.onderdeel-detail .g2 { margin-bottom: 8px; }
.onderdeel-detail input {
  width: 100%; padding: 9px 11px;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px; font-family: inherit;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.88);
  background: rgba(255,255,255,0.06);
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
.onderdeel-detail input::placeholder { color: rgba(255,255,255,0.25); }
.onderdeel-detail input:focus {
  outline: none;
  border-color: rgba(77,124,254,0.60);
  background: rgba(255,255,255,0.10);
  box-shadow: 0 0 0 3px rgba(77,124,254,0.14);
}
.onderdeel-detail .field-label {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.38);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 5px; display: block;
}

/* ─── FOTO PREVIEW ───────────────────────────── */
.foto-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.foto-grid img {
  width: 78px; height: 78px; object-fit: cover;
  border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.16);
  box-shadow: 0 4px 16px rgba(0,0,0,0.40);
}

/* ─── KNOP BAR ───────────────────────────────── */
.btn-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(5,13,26,0.80);
  -webkit-backdrop-filter: blur(30px) saturate(160%);
  backdrop-filter: blur(30px) saturate(160%);
  padding: 14px 20px 20px;
  border-top: 1px solid rgba(255,255,255,0.09);
  z-index: 40;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.35);
}
.btn {
  width: 100%; padding: 16px;
  border: 1px solid rgba(249,115,22,0.45);
  border-radius: 16px;
  font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: .2px;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-appearance: none;
  background: linear-gradient(135deg, rgba(249,115,22,0.80) 0%, rgba(234,88,12,0.85) 100%);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  color: #fff;
  box-shadow: 0 4px 24px rgba(249,115,22,0.35), inset 0 1px 0 rgba(255,255,255,0.22);
}
.btn:hover {
  background: linear-gradient(135deg, rgba(249,115,22,1) 0%, rgba(234,88,12,1) 100%);
  box-shadow: 0 6px 32px rgba(249,115,22,0.55), inset 0 1px 0 rgba(255,255,255,0.28);
}
.btn:active { transform: scale(.97); }

/* ─── TOAST ──────────────────────────────────── */
.toast {
  position: fixed; top: 72px; left: 50%;
  transform: translateX(-50%) translateY(-16px);
  background: rgba(15,26,50,0.90);
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.16);
  color: #fff; padding: 12px 22px;
  border-radius: 30px; font-size: 14px; font-weight: 600;
  opacity: 0; transition: opacity .3s, transform .3s;
  z-index: 100; pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── DIVIDER ────────────────────────────────── */
hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0; }
</style>
</head>
<body>

<!-- SVG Liquid displacement filter -->
<svg style="position:absolute;width:0;height:0;overflow:hidden;">
  <filter id="liquid">
    <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="2" result="turbulence" seed="5"/>
    <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="18" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<!-- Achtergrond orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>
<div class="orb orb-5"></div>

<header>
  <img src="https://www.middelwateringbouw.nl/images/logo-middelwateringbouw-wit-2018.png"
       alt="Middelwatering Bouw"
       onerror="this.style.display='none'">
  <h1>Verplaatslijst <small>Middelwatering Bouw</small></h1>
</header>

<div class="container">

  <!-- ── ALGEMEEN ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Algemene informatie <span class="chevron">▾</span>
    </div>
    <div class="card-body">
      <div class="g2">
        <div class="field">
          <label>Datum</label>
          <input type="date" id="datum">
        </div>
        <div class="field">
          <label>Ingevuld door</label>
          <input type="text" id="naam" placeholder="Naam">
        </div>
      </div>
      <div class="field">
        <label>Bouwplaats</label>
        <input type="text" id="bouwplaats" placeholder="Naam / adres bouwplaats">
      </div>
      <div class="g2">
        <div class="field">
          <label>Werknr. (van)</label>
          <input type="text" id="glob_van" placeholder="Van werknr.">
        </div>
        <div class="field">
          <label>Werknr. (naar)</label>
          <input type="text" id="glob_naar" placeholder="Naar werknr.">
        </div>
      </div>
      <div class="field">
        <label>Opslag / zaak</label>
        <input type="text" id="glob_opslag" placeholder="Opslaglocatie">
      </div>
    </div>
  </div>

  <!-- ── AANSLUITINGEN ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Aansluitingen <span class="chevron">▾</span>
    </div>
    <div class="card-body" id="sec-aansluitingen">
      <!-- items rendered by JS -->
    </div>
  </div>

  <!-- ── KETEN ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Keten <span class="chevron">▾</span>
    </div>
    <div class="card-body" id="sec-keten">
    </div>
  </div>

  <!-- ── CONTAINERS ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Materiaalcontainers <span class="chevron">▾</span>
    </div>
    <div class="card-body" id="sec-containers">
    </div>
  </div>

  <!-- ── LICHTMASTEN ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Lichtmasten <span class="chevron">▾</span>
    </div>
    <div class="card-body" id="sec-lichtmasten">
    </div>
  </div>

  <!-- ── BOUWHEKKEN ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Bouwhekken &amp; Rijplaten <span class="chevron">▾</span>
    </div>
    <div class="card-body" id="sec-hekken">
    </div>
  </div>

  <!-- ── FOTO'S ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Foto's <span class="chevron">▾</span>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Foto's toevoegen (max 5)</label>
        <input type="file" id="fotos" multiple accept="image/*" capture="environment">
      </div>
      <div class="foto-grid" id="foto-preview"></div>
    </div>
  </div>

  <!-- ── OPMERKINGEN ── -->
  <div class="card glass">
    <div class="card-header open" onclick="toggleCard(this)">
      Algemene opmerkingen <span class="chevron">▾</span>
    </div>
    <div class="card-body">
      <div class="field">
        <textarea id="algemeen_opmerking" rows="3" placeholder="Eventuele opmerkingen..." style="resize:vertical;"></textarea>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- ── BUTTON BAR ── -->
<div class="btn-bar">
  <button class="btn btn-primary" onclick="verstuurAlles()">Verstuur</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   ITEM DEFINITIE
══════════════════════════════════════════════ */
const SECTIES = {
  'sec-aansluitingen': [
    { id: 'bouwmeterkast', naam: 'Bouwmeterkast (35A / 63A / 125A)' },
    { id: 'waterput',      naam: 'Waterput' },
    { id: 'waterkraan',    naam: 'Waterkraan / standvink' },
  ],
  'sec-keten': [
    { id: 'pipokeet',          naam: 'Pipokeet' },
    { id: 'schaftkeet_1',      naam: 'Schaftkeet 1' },
    { id: 'schaftkeet_2',      naam: 'Schaftkeet 2' },
    { id: 'schaftkeet_3',      naam: 'Schaftkeet 3' },
    { id: 'schaftkeet_4',      naam: 'Schaftkeet 4' },
    { id: 'uitvoerderskeet_1', naam: 'Uitvoerderskeet 1' },
    { id: 'uitvoerderskeet_2', naam: 'Uitvoerderskeet 2' },
    { id: 'uitvoerderskeet_3', naam: 'Uitvoerderskeet 3' },
    { id: 'uitvoerderskeet_4', naam: 'Uitvoerderskeet 4' },
    { id: 'keettrap',          naam: 'Keettrap (Set)' },
  ],
  'sec-containers': [
    { id: 'container_1', naam: 'Materiaalcontainer 1' },
    { id: 'container_2', naam: 'Materiaalcontainer 2' },
  ],
  'sec-lichtmasten': [
    { id: 'lichtmast_1', naam: 'Lichtmast 1' },
    { id: 'lichtmast_2', naam: 'Lichtmast 2' },
    { id: 'lichtmast_3', naam: 'Lichtmast 3' },
    { id: 'lichtmast_4', naam: 'Lichtmast 4' },
    { id: 'lichtmast_5', naam: 'Lichtmast 5' },
    { id: 'lichtmast_6', naam: 'Lichtmast 6' },
  ],
  'sec-hekken': [
    { id: 'bouwhekken',        naam: 'Bouwhekken' },
    { id: 'bouwhek_voeten',    naam: 'Bouwhek voeten' },
    { id: 'hekklemmen',        naam: 'Hekklemmen' },
    { id: 'hekwielen',         naam: 'Hekwielen' },
    { id: 'hek_schoren',       naam: 'Hek schoren' },
    { id: 'kunststof_rijplaten', naam: 'Kunststof rijplaten' },
  ]
};

/* ══════════════════════════════════════════════
   RENDER ITEMS
══════════════════════════════════════════════ */
function renderItems() {
  for (const [sectieId, items] of Object.entries(SECTIES)) {
    const container = document.getElementById(sectieId);
    if (!container) continue;
    container.innerHTML = '';
    items.forEach(item => {
      container.insertAdjacentHTML('beforeend', `
        <div class="onderdeel" id="o_${item.id}">
          <div class="onderdeel-title" onclick="toggleItem('${item.id}')">
            <span>${item.naam}</span>
            <span class="badge leeg" id="badge_${item.id}">—</span>
          </div>
          <div class="onderdeel-detail" id="detail_${item.id}">
            <div class="g3" style="margin-bottom:8px">
              <div class="input-group">
                <span class="field-label">Aantal</span>
                <input type="number" id="${item.id}_aantal" placeholder="0" min="0"
                       oninput="updateBadge('${item.id}')">
              </div>
              <div class="input-group">
                <span class="field-label">Nummer</span>
                <input type="text" id="${item.id}_nummer" placeholder="Nr.">
              </div>
              <div class="input-group">
                <span class="field-label">Opmerking</span>
                <input type="text" id="${item.id}_opmerking" placeholder="...">
              </div>
            </div>
            <div class="g2">
              <div class="input-group">
                <span class="field-label">Werknr. (van)</span>
                <input type="text" id="${item.id}_van" placeholder="Van">
              </div>
              <div class="input-group">
                <span class="field-label">Werknr. (naar)</span>
                <input type="text" id="${item.id}_naar" placeholder="Naar">
              </div>
            </div>
            <div style="margin-top:8px">
              <div class="input-group">
                <span class="field-label">Opslag / zaak</span>
                <input type="text" id="${item.id}_opslag" placeholder="Opslaglocatie">
              </div>
            </div>
          </div>
        </div>
      `);
    });
  }
}

/* ══════════════════════════════════════════════
   TOGGLE ACCORDION
══════════════════════════════════════════════ */
function toggleCard(header) {
  const body = header.nextElementSibling;
  const isOpen = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed', isOpen);
  header.classList.toggle('open', !isOpen);
}

function toggleItem(id) {
  const detail = document.getElementById('detail_' + id);
  detail.classList.toggle('open');

  // Pre-fill Van/Naar/Opslag uit globale velden als leeg
  const globVan    = document.getElementById('glob_van').value;
  const globNaar   = document.getElementById('glob_naar').value;
  const globOpslag = document.getElementById('glob_opslag').value;

  const vanField    = document.getElementById(id + '_van');
  const naarField   = document.getElementById(id + '_naar');
  const opslagField = document.getElementById(id + '_opslag');

  if (detail.classList.contains('open')) {
    if (!vanField.value    && globVan)    vanField.value    = globVan;
    if (!naarField.value   && globNaar)   naarField.value   = globNaar;
    if (!opslagField.value && globOpslag) opslagField.value = globOpslag;
  }
}

function updateBadge(id) {
  const val   = document.getElementById(id + '_aantal').value;
  const badge = document.getElementById('badge_' + id);
  if (val && parseInt(val) > 0) {
    badge.textContent = val;
    badge.classList.remove('leeg');
  } else {
    badge.textContent = '—';
    badge.classList.add('leeg');
  }
}

/* ══════════════════════════════════════════════
   ALLE ITEMS (plat)
══════════════════════════════════════════════ */
function alleItems() {
  const items = [];
  for (const lijst of Object.values(SECTIES)) {
    items.push(...lijst);
  }
  return items;
}

/* ══════════════════════════════════════════════
   DATA VERZAMELEN
══════════════════════════════════════════════ */
function collectData() {
  const data = {
    datum:          document.getElementById('datum').value,
    naam:           document.getElementById('naam').value,
    bouwplaats:     document.getElementById('bouwplaats').value,
    glob_van:       document.getElementById('glob_van').value,
    glob_naar:      document.getElementById('glob_naar').value,
    glob_opslag:    document.getElementById('glob_opslag').value,
    algemeen_opmerking: document.getElementById('algemeen_opmerking').value,
    onderdelen: {}
  };

  alleItems().forEach(item => {
    const aantal = document.getElementById(item.id + '_aantal')?.value;
    const nummer = document.getElementById(item.id + '_nummer')?.value;
    const van    = document.getElementById(item.id + '_van')?.value;
    const naar   = document.getElementById(item.id + '_naar')?.value;
    const opslag = document.getElementById(item.id + '_opslag')?.value;
    const opm    = document.getElementById(item.id + '_opmerking')?.value;

    data.onderdelen[item.id] = { naam: item.naam, aantal, nummer, van, naar, opslag, opm };
  });

  return data;
}

/* ══════════════════════════════════════════════
   OFFLINE OPSLAAN
══════════════════════════════════════════════ */
function saveOffline() {
  const data = collectData();
  localStorage.setItem('mwb_verplaatslijst', JSON.stringify(data));
  showToast('Opgeslagen ✓');
}

/* ══════════════════════════════════════════════
   OPGESLAGEN DATA LADEN
══════════════════════════════════════════════ */
function loadSaved() {
  const raw = localStorage.getItem('mwb_verplaatslijst');
  if (!raw) return;
  const data = JSON.parse(raw);

  if (data.datum)       document.getElementById('datum').value          = data.datum;
  if (data.naam)        document.getElementById('naam').value           = data.naam;
  if (data.bouwplaats)  document.getElementById('bouwplaats').value     = data.bouwplaats;
  if (data.glob_van)    document.getElementById('glob_van').value       = data.glob_van;
  if (data.glob_naar)   document.getElementById('glob_naar').value      = data.glob_naar;
  if (data.glob_opslag) document.getElementById('glob_opslag').value    = data.glob_opslag;
  if (data.algemeen_opmerking) document.getElementById('algemeen_opmerking').value = data.algemeen_opmerking;

  if (data.onderdelen) {
    for (const [id, velden] of Object.entries(data.onderdelen)) {
      const el = (suffix) => document.getElementById(id + '_' + suffix);
      if (el('aantal'))    { el('aantal').value    = velden.aantal  || ''; updateBadge(id); }
      if (el('nummer'))      el('nummer').value    = velden.nummer  || '';
      if (el('van'))         el('van').value        = velden.van     || '';
      if (el('naar'))        el('naar').value       = velden.naar    || '';
      if (el('opslag'))      el('opslag').value     = velden.opslag  || '';
      if (el('opmerking'))   el('opmerking').value  = velden.opm     || '';
    }
  }
}

/* ══════════════════════════════════════════════
   ALLES VERSTUREN (Notion + Mail)
══════════════════════════════════════════════ */
async function verstuurAlles() {
  const data = collectData();

  if (!data.datum || !data.bouwplaats) {
    showToast('⚠️ Vul datum en bouwplaats in');
    return;
  }

  saveOffline();
  showToast('⏳ Versturen...');

  // Eerst naar Notion
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (json.ok) {
      showToast('✅ Opgeslagen in Notion!');
    } else {
      showToast('⚠️ Notion mislukt, mail wordt geopend');
    }
  } catch (e) {
    showToast('⚠️ Notion mislukt, mail wordt geopend');
  }

  // Dan ook mail openen
  setTimeout(() => {
    const onderwerp = `Verplaatslijst – ${data.bouwplaats} – ${data.datum}`;
    const body = buildMailBody(data);
    window.location.href =
      `mailto:materieel@middelwateringbouw.nl` +
      `?subject=${encodeURIComponent(onderwerp)}` +
      `&body=${encodeURIComponent(body)}`;
  }, 1200);
}

/* ══════════════════════════════════════════════
   NOTION VERSTUREN
══════════════════════════════════════════════ */

// Vul hier de Cloudflare Worker URL in na het deployen:
const WORKER_URL = 'https://mwb-verplaatslijst.je-mudde.workers.dev';

async function stuurNaarNotion() {
  if (!WORKER_URL) {
    showToast('⚠️ Worker URL nog niet ingesteld');
    return;
  }

  const data = collectData();
  if (!data.datum || !data.bouwplaats) {
    showToast('⚠️ Vul datum en bouwplaats in');
    return;
  }

  saveOffline();
  showToast('⏳ Versturen naar Notion...');

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const json = await res.json();
    if (json.ok) {
      showToast('✅ Opgeslagen in Notion!');
    } else {
      showToast('❌ Fout: ' + (json.error || 'onbekend'));
    }
  } catch (e) {
    showToast('❌ Verbindingsfout');
  }
}

/* ══════════════════════════════════════════════
   MAIL BODY OPBOUWEN
══════════════════════════════════════════════ */
function buildMailBody(data) {
  let lines = [];
  lines.push('VERPLAATSLIJST MIDDELWATERING BOUW');
  lines.push('===================================');
  lines.push('');
  lines.push(`Datum:       ${data.datum}`);
  lines.push(`Ingevuld:    ${data.naam}`);
  lines.push(`Bouwplaats:  ${data.bouwplaats}`);
  lines.push(`Van werknr.: ${data.glob_van}`);
  lines.push(`Naar werknr.:${data.glob_naar}`);
  lines.push(`Opslag/zaak: ${data.glob_opslag}`);
  lines.push('');

  // Groepeer per sectie
  const sectieNamen = {
    'sec-aansluitingen': 'AANSLUITINGEN',
    'sec-keten':         'KETEN',
    'sec-containers':    'MATERIAALCONTAINERS',
    'sec-lichtmasten':   'LICHTMASTEN',
    'sec-hekken':        'BOUWHEKKEN & RIJPLATEN'
  };

  for (const [sectieId, items] of Object.entries(SECTIES)) {
    const heeftInhoud = items.some(i => {
      const v = data.onderdelen[i.id];
      return v && (v.aantal || v.nummer || v.opm);
    });
    if (!heeftInhoud) continue;

    lines.push(sectieNamen[sectieId] || sectieId.toUpperCase());
    lines.push('---');

    items.forEach(item => {
      const v = data.onderdelen[item.id];
      if (!v || (!v.aantal && !v.nummer && !v.opm)) return;

      lines.push(`${item.naam}`);
      if (v.aantal)  lines.push(`  Aantal:    ${v.aantal}`);
      if (v.nummer)  lines.push(`  Nummer:    ${v.nummer}`);
      if (v.van)     lines.push(`  Van:       ${v.van}`);
      if (v.naar)    lines.push(`  Naar:      ${v.naar}`);
      if (v.opslag)  lines.push(`  Opslag:    ${v.opslag}`);
      if (v.opm)     lines.push(`  Opmerking: ${v.opm}`);
    });
    lines.push('');
  }

  if (data.algemeen_opmerking) {
    lines.push('OPMERKINGEN');
    lines.push('---');
    lines.push(data.algemeen_opmerking);
    lines.push('');
  }

  lines.push('---');
  lines.push('Verstuurd via Verplaatslijst-app MWB');

  return lines.join('\n');
}

/* ══════════════════════════════════════════════
   VERSTUREN
══════════════════════════════════════════════ */
function versturen() {
  const data = collectData();

  if (!data.datum || !data.bouwplaats) {
    showToast('⚠️ Vul datum en bouwplaats in');
    return;
  }

  saveOffline(); // altijd ook lokaal opslaan

  const onderwerp = `Verplaatslijst – ${data.bouwplaats} – ${data.datum}`;
  const body      = buildMailBody(data);

  window.location.href =
    `mailto:materieel@middelwateringbouw.nl` +
    `?subject=${encodeURIComponent(onderwerp)}` +
    `&body=${encodeURIComponent(body)}`;
}

/* ══════════════════════════════════════════════
   FOTO PREVIEW
══════════════════════════════════════════════ */
document.getElementById('fotos').addEventListener('change', function(e) {
  const preview = document.getElementById('foto-preview');
  preview.innerHTML = '';
  const files = Array.from(e.target.files).slice(0, 5);
  files.forEach(file => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

/* ══════════════════════════════════════════════
   TOAST NOTIFICATION
══════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════════════
   STANDAARD DATUM
══════════════════════════════════════════════ */
function setDefaultDatum() {
  const el = document.getElementById('datum');
  if (!el.value) {
    const now = new Date();
    el.value = now.toISOString().split('T')[0];
  }
}
